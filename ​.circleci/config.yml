version: 2.1
jobs:
  build:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: "تهيئة النظام باسم المطور محمد"
          command: |
            echo -e "\e[1;34m===============================================\e[0m"
            echo -e "\e[1;32m   مرحباً بك في نظام حراج اليمن الإلكتروني   \e[0m"
            echo -e "\e[1;36m   المطور المسؤول: محمد (Mohammed)   \e[0m"
            echo -e "\e[1;34m===============================================\e[0m"

      - run:
          name: "تشغيل نظام حساب العمولات الآلي"
          command: |
            echo -e "\e[1;33m[جاري التحقق].. تفعيل ميزة احتساب عمولة المبيعات بنجاح (1%)\e[0m"
            echo -e "\e[1;32m[جاهز] النظام مستعد الآن لاستقبال عمليات البيع والشراء الكترونياً.\e[0m"
            echo -e "\e[1;35m===============================================\e[0m"

workflows:
  welcome:
    jobs:
      - build
